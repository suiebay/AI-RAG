{% extends "base.html" %}
{% block title %}Кіру — Оқу көмекшісі{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📚</div>
    <h1>Оқу көмекшісі</h1>
    <p class="muted center">Жүйеге кіру үшін мәліметтеріңізді енгізіңіз</p>
    <form method="post" action="/login">
      <label>Пайдаланушы аты
        <input type="text" name="username" required autofocus autocomplete="username">
      </label>
      <label>Құпия сөз
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <button type="submit" class="btn-primary btn-full">Кіру</button>
    </form>
    <div class="hint">
      <strong>Демо аккаунттар:</strong><br>
      Әкімші — <code>admin</code> / <code>admin123</code><br>
      Оқушы — <code>student</code> / <code>student123</code>
    </div>
  </div>
</div>
{% endblock %}
